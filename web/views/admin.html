<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能爬 API - nengpa.com</title>
    <script>
        if (location.host === '120.24.86.32:3000') {
            location.href = 'https://www.nengpa.com' + location.pathname + location.search;
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <nav class="navbar">
                <h1>管理后台</h1>
                <div class="nav-links">
                    <span id="adminUsername"></span>
                    <button id="logoutBtn" class="btn btn-sm">退出</button>
                </div>
            </nav>
        </header>

        <main>
            <div class="tabs">
                <button class="tab active" data-tab="users">用户管理</button>
                <button class="tab" data-tab="activation">待激活用户</button>
                <button class="tab" data-tab="apikeys">API Keys</button>
                <button class="tab" data-tab="usage">用量统计</button>
            </div>

            <!-- 用户管理 -->
            <section id="users-tab" class="tab-content active">
                <div class="section-header">
                    <h2>用户列表</h2>
                    <div class="search-box">
                        <!-- //排序 id / 用量  -->
                         排序
                        <select id="sortSelect">
                            <option value="id">ID</option>
                            <option value="usage">用量</option>
                        </select>
                        <input type="text" id="userSearchInput" placeholder="搜索用户名..." onkeypress="if(event.key==='Enter')searchUsers()">
                        <select id="levelFilter">
                            <option value="">全部等级</option>
                            <option value="1">普通</option>
                            <option value="2">高速</option>
                        </select>
                        <input type="number" id="userIdFilter" placeholder="用户ID" style="width: 80px;">
                        <select id="gmlFilter">
                            <option value="">全部Gml</option>
                            <option value="1">是</option>
                            <option value="-1">否</option>
                        </select>
                        <select id="kimiFilter">
                            <option value="">全部Kimi</option>
                            <option value="1">是</option>
                            <option value="-1">否</option>
                        </select>
                        <button class="btn btn-sm" onclick="searchUsers()">搜索</button>
                    </div>
                    <button id="createUserBtn" class="btn btn-primary">创建用户</button>
                </div>
                <div id="usersList" class="data-table">
                    <!-- Users will be loaded here -->
                </div>
            </section>

            <!-- 待激活用户 -->
            <section id="activation-tab" class="tab-content">
                <div class="section-header">
                    <h2>待激活用户列表</h2>
                    <button id="batchCreateActivationBtn" class="btn btn-primary">批量创建</button>
                </div>
                <div id="activationUsersList" class="data-table">
                    <!-- Activation users will be loaded here -->
                </div>
            </section>

            <!-- API Keys -->
            <section id="apikeys-tab" class="tab-content">
                <div class="section-header">
                    <h2>API Keys</h2>
                    <button id="createApiKeyBtn" class="btn btn-primary">创建 API Key</button>
                </div>
                <div class="search-box">
                    <input type="text" id="apiKeySearchInput" placeholder="搜索 Key 值..." onkeypress="if(event.key==='Enter')searchAPIKeys()">
                    <input type="text" id="apiKeyUserIdInput" placeholder="用户ID..." onkeypress="if(event.key==='Enter')searchAPIKeys()">
                    <button class="btn btn-sm" onclick="searchAPIKeys()">搜索</button>
                </div>
                <div id="apiKeysList" class="data-table">
                    <!-- API Keys will be loaded here -->
                </div>
            </section>

            <!-- 用量统计 -->
            <section id="usage-tab" class="tab-content">
                <div class="section-header">
                    <h2>用量统计</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>总请求数</h3>
                        <p class="stat-value" id="totalRequests">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>总 Token 数</h3>
                        <p class="stat-value" id="totalTokens">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>总费用</h3>
                        <p class="stat-value" id="totalCost">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>用户数</h3>
                        <p class="stat-value" id="totalUsers">-</p>
                    </div>
                </div>

                <!-- 上游 API 用量 -->
                <div class="section-header" style="margin-top: 24px;">
                    <h2>上游 API 用量</h2>
                </div>
                <div id="upstreamUsage" class="data-table">
                    <p class="empty">加载中...</p>
                </div>

                <div id="usageList" class="data-table">
                    <!-- Usage logs will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- 创建用户 Modal -->
    <div id="createUserModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>创建用户</h2>
            <form id="createUserForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" value="123456"  required>
                </div>
                <div class="form-group">
                    <label>请求次数限制</label>
                    <input type="number" name="request_limit" value="300" required>
                </div>
                <div class="form-group">
                    <label>周额度限制（-1无限制，1有限制）</label>
                    <input type="number" name="has_weekly_limit" value="-1" required>
                </div>
                <div class="form-group">
                    <label>周限额度</label>
                    <input type="number" name="week_request_limit" value="0">
                </div>
                <div class="form-group">
                    <label>过期时间（留空表示永不过期）</label>
                    <input type="datetime-local" name="expires_at">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" name="remark" placeholder="可选">
                </div>
                <button type="submit" class="btn btn-primary">创建</button>
            </form>
        </div>
    </div>

    <!-- 编辑用户 Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>编辑用户</h2>
            <form id="editUserForm">
                <input type="hidden" name="id" id="editUserId">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" id="editUsername" readonly>
                </div>
                <div class="form-group">
                    <label>请求次数限制</label>
                    <input type="number" name="request_limit" id="editRequestLimit" required>
                </div>
                <div class="form-group">
                    <label>周额度限制（-1无限制，1有限制）</label>
                    <input type="number" name="has_weekly_limit" id="editWeeklyLimit" value="-1" required>
                </div>
                <div class="form-group">
                    <label>过期时间（留空表示永不过期）</label>
                    <input type="datetime-local" name="expires_at" id="editExpiresAt">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" name="remark" id="editRemark" placeholder="可选">
                </div>
                <div class="form-group">
                    <label>级别</label>
                    <input type="number" name="level" id="editLevel" value="1">
                </div>
                <div class="form-group">
                    <label>使用GML</label>
                    <input type="number" name="use_glm" id="edituseGlm" value="-1">
                </div>
                <div class="form-group">
                    <label>使用Kimi</label>
                    <input type="number" name="use_kimi" id="editUseKimi" value="-1">
                </div>
                <div class="form-group">
                    <label>周限额度</label>
                    <input type="number" name="week_request_limit" id="editWeekRequestLimit" value="0">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 创建 API Key Modal -->
    <div id="createApiKeyModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>创建 API Key</h2>
            <form id="createApiKeyForm">
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="number" name="user_id" required>
                </div>
                <div class="form-group">
                    <label>Key 名称</label>
                    <input type="text" name="key_name" placeholder="可选">
                </div>
                <button type="submit" class="btn btn-primary">创建</button>
            </form>
        </div>
    </div>

    <!-- 批量创建待激活用户 Modal -->
    <div id="batchCreateActivationModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close">&times;</span>
            <h2>批量创建待激活用户</h2>
            <form id="batchCreateActivationForm">
                <div class="form-group">
                    <label>密码</label>
                    <input type="text" name="password" value="qwedcvb" required placeholder="所有用户的统一密码">
                </div>
                <div class="form-group">
                    <label>有效天数</label>
                    <input type="number" name="valid_days" required value="30" min="1">
                </div>
                <div class="form-group">
                    <label>请求限制</label>
                    <input type="number" name="request_limit" required value="300" min="1">
                </div>
                <div class="form-group">
                    <label>等级</label>
                    <input type="number" name="level" required value="1" min="1">
                </div>
                <div class="form-group">
                    <label>使用GML（1是，-1否，默认-1）</label>
                    <input type="number" name="use_glm" required value="-1">
                </div>
                <div class="form-group">
                    <label>使用Kimi（1是，-1否，默认-1）</label>
                    <input type="number" name="use_kimi" required value="-1">
                </div>
                <div class="form-group">
                    <label>周额度限制（-1无限制，1有限制）</label>
                    <input type="number" name="has_weekly_limit" required value="-1">
                </div>
                <div class="form-group">
                    <label>周限额度</label>
                    <input type="number" name="week_request_limit" value="0">
                </div>
                <div class="form-group">
                    <label>账号个数</label>
                    <input type="number" name="count" required value="10" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" name="remarks" placeholder="可选">
                </div>
                <button type="submit" class="btn btn-primary">批量创建</button>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js?v=4.0.0"></script>
</body>
</html>
