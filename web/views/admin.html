<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - LLM API</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <nav class="navbar">
                <h1>管理后台</h1>
                <div class="nav-links">
                    <span id="adminUsername"></span>
                    <button id="logoutBtn" class="btn btn-sm">退出</button>
                </div>
            </nav>
        </header>

        <main>
            <div class="tabs">
                <button class="tab active" data-tab="users">用户管理</button>
                <button class="tab" data-tab="activation">待激活用户</button>
                <button class="tab" data-tab="apikeys">API Keys</button>
                <button class="tab" data-tab="usage">用量统计</button>
            </div>

            <!-- 用户管理 -->
            <section id="users-tab" class="tab-content active">
                <div class="section-header">
                    <h2>用户列表</h2>
                    <div class="search-box">
                        <!-- //排序 id / 用量  -->
                         排序
                        <select id="sortSelect">
                            <option value="id">ID</option>
                            <option value="usage">用量</option>
                        </select>
                        <input type="text" id="userSearchInput" placeholder="搜索用户名..." onkeypress="if(event.key==='Enter')searchUsers()">
                        <button class="btn btn-sm" onclick="searchUsers()">搜索</button>
                    </div>
                    <button id="createUserBtn" class="btn btn-primary">创建用户</button>
                </div>
                <div id="usersList" class="data-table">
                    <!-- Users will be loaded here -->
                </div>
            </section>

            <!-- 待激活用户 -->
            <section id="activation-tab" class="tab-content">
                <div class="section-header">
                    <h2>待激活用户列表</h2>
                    <button id="batchCreateActivationBtn" class="btn btn-primary">批量创建</button>
                </div>
                <div id="activationUsersList" class="data-table">
                    <!-- Activation users will be loaded here -->
                </div>
            </section>

            <!-- API Keys -->
            <section id="apikeys-tab" class="tab-content">
                <div class="section-header">
                    <h2>API Keys</h2>
                    <button id="createApiKeyBtn" class="btn btn-primary">创建 API Key</button>
                </div>
                <div id="apiKeysList" class="data-table">
                    <!-- API Keys will be loaded here -->
                </div>
            </section>

            <!-- 用量统计 -->
            <section id="usage-tab" class="tab-content">
                <div class="section-header">
                    <h2>用量统计</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>总请求数</h3>
                        <p class="stat-value" id="totalRequests">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>总 Token 数</h3>
                        <p class="stat-value" id="totalTokens">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>总费用</h3>
                        <p class="stat-value" id="totalCost">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>用户数</h3>
                        <p class="stat-value" id="totalUsers">-</p>
                    </div>
                </div>

                <!-- 上游 API 用量 -->
                <div class="section-header" style="margin-top: 24px;">
                    <h2>上游 API 用量</h2>
                </div>
                <div id="upstreamUsage" class="data-table">
                    <p class="empty">加载中...</p>
                </div>

                <div id="usageList" class="data-table">
                    <!-- Usage logs will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- 创建用户 Modal -->
    <div id="createUserModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>创建用户</h2>
            <form id="createUserForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" value="123456"  required>
                </div>
                <div class="form-group">
                    <label>请求次数限制</label>
                    <input type="number" name="request_limit" value="300" required>
                </div>
                <div class="form-group">
                    <label>过期时间（留空表示永不过期）</label>
                    <input type="datetime-local" name="expires_at">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" name="remark" placeholder="可选">
                </div>
                <button type="submit" class="btn btn-primary">创建</button>
            </form>
        </div>
    </div>

    <!-- 编辑用户 Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>编辑用户</h2>
            <form id="editUserForm">
                <input type="hidden" name="id" id="editUserId">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" id="editUsername" readonly>
                </div>
                <div class="form-group">
                    <label>请求次数限制</label>
                    <input type="number" name="request_limit" id="editRequestLimit" required>
                </div>
                <div class="form-group">
                    <label>过期时间（留空表示永不过期）</label>
                    <input type="datetime-local" name="expires_at" id="editExpiresAt">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" name="remark" id="editRemark" placeholder="可选">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 创建 API Key Modal -->
    <div id="createApiKeyModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>创建 API Key</h2>
            <form id="createApiKeyForm">
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="number" name="user_id" required>
                </div>
                <div class="form-group">
                    <label>Key 名称</label>
                    <input type="text" name="key_name" placeholder="可选">
                </div>
                <button type="submit" class="btn btn-primary">创建</button>
            </form>
        </div>
    </div>

    <!-- 批量创建待激活用户 Modal -->
    <div id="batchCreateActivationModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close">&times;</span>
            <h2>批量创建待激活用户</h2>
            <form id="batchCreateActivationForm">
                <div class="form-group">
                    <label>密码</label>
                    <input type="text" name="password" value="qwedcvb" required placeholder="所有用户的统一密码">
                </div>
                <div class="form-group">
                    <label>有效天数</label>
                    <input type="number" name="valid_days" required value="30" min="1">
                </div>
                <div class="form-group">
                    <label>请求限制</label>
                    <input type="number" name="request_limit" required value="300" min="1">
                </div>
                <div class="form-group">
                    <label>账号个数</label>
                    <input type="number" name="count" required value="10" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" name="remarks" placeholder="可选">
                </div>
                <button type="submit" class="btn btn-primary">批量创建</button>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // 复制 API Key
        function copyKey(keyValue) {
            navigator.clipboard.writeText(keyValue).then(() => {
                alert('已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败:', err);
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = keyValue;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('已复制到剪贴板');
            });
        }

        // 获取认证头
        function getAuthHeader() {
            const token = localStorage.getItem('token');
            return token ? { 'Authorization': 'Bearer ' + token } : {};
        }

        // 检查响应，如果 token 失效则跳转到登录页
        async function checkResponse(response) {
            if (response.status === 401) {
                const data = await response.json();
                if (data.error && (data.error.includes('token') || data.error.includes('Token'))) {
                    localStorage.removeItem('user');
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                    throw new Error('Token expired');
                }
            }
            return response;
        }

        // 统一的 fetch 包装函数
        async function adminFetch(url, options = {}) {
            const response = await fetch(url, { ...options, headers: { ...getAuthHeader(), ...options.headers } });
            await checkResponse(response);
            return response;
        }

        // Check if admin is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || !user.is_admin) {
            window.location.href = '/login.html';
        }

        document.getElementById('adminUsername').textContent = user.username;

        // 分页变量
        let usersPage = 1;
        let usersPageSize = 10;
        let usersTotal = 0;
        let usersSearch = '';
        let activationPage = 1;
        let activationPageSize = 10;
        let activationTotal = 0;
        let apiKeysPage = 1;
        let apiKeysPageSize = 10;
        let apiKeysTotal = 0;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-tab').classList.add('active');

                if (tab.dataset.tab === 'users') loadUsers();
                if (tab.dataset.tab === 'activation') loadActivationUsers();
                if (tab.dataset.tab === 'apikeys') loadAPIKeys();
                if (tab.dataset.tab === 'usage') {
                    loadUsage();
                    loadUpstreamUsage();
                }
            });
        });

        // Load Users
        async function loadUsers() {
            try {
                let url = `/admin/users?page=${usersPage}&page_size=${usersPageSize}`;
                if (usersSearch) {
                    url += `&username=${encodeURIComponent(usersSearch)}`;
                }
                sort = document.getElementById('sortSelect').value;
                url += '&sort='+sort;
                const response = await adminFetch(url);
                const data = await response.json();

                usersTotal = data.total || 0;

                const container = document.getElementById('usersList');
                if (!data.data || data.data.length === 0) {
                    container.innerHTML = '<p class="empty">暂无用户</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>额度限制</th>
                                <th>已用次数</th>
                                <th>过期时间</th>
                                <th>状态</th>
                                <th>备注</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(u => {
                                const isExpired = u.expires_at && new Date(u.expires_at) < new Date();
                                const status = u.expires_at ? (isExpired ? '<span class="status inactive">已过期</span>' : '<span class="status active">正常</span>') : '<span class="status active">永不过期</span>';
                                return `
                                <tr>
                                    <td>${u.id}</td>
                                    <td>${u.username}</td>
                                    <td>${u.request_limit}</td>
                                    <td>${u.request_count}</td>
                                    <td>${u.expires_at || '-'}</td>
                                    <td>${status}</td>
                                    <td>${u.remark || '-'}</td>
                                    <td>${u.created_at}</td>
                                    <td>
                                        <button class="btn btn-sm" onclick="editUser(${u.id}, ${u.request_limit}, '${u.expires_at || ''}', '${u.username}', '${u.remark || ''}')">编辑</button>
                                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">删除</button>
                                    </td>
                                </tr>
                            `}).join('')}
                        </tbody>
                    </table>
                    </div>
                    <div class="pagination">
                        <button class="btn btn-sm" onclick="changeUsersPage(1)">首页</button>
                        <button class="btn btn-sm" onclick="changeUsersPage(${usersPage - 1})" ${usersPage <= 1 ? 'disabled' : ''}>上一页</button>
                        <span>第 ${usersPage} / ${Math.ceil(usersTotal / usersPageSize)} 页</span>
                        <button class="btn btn-sm" onclick="changeUsersPage(${usersPage + 1})" ${usersPage >= Math.ceil(usersTotal / usersPageSize) ? 'disabled' : ''}>下一页</button>
                        <button class="btn btn-sm" onclick="changeUsersPage(${Math.ceil(usersTotal / usersPageSize)})">尾页</button>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load users:', error);
            }
        }

        function changeUsersPage(newPage) {
            const totalPages = Math.ceil(usersTotal / usersPageSize);
            if (newPage < 1 || newPage > totalPages) return;
            usersPage = newPage;
            loadUsers();
        }

        function searchUsers() {
            const searchInput = document.getElementById('userSearchInput');
            usersSearch = searchInput.value.trim();
            usersPage = 1;
            loadUsers();
        }

        function changeActivationPage(newPage) {
            const totalPages = Math.ceil(activationTotal / activationPageSize);
            if (newPage < 1 || newPage > totalPages) return;
            activationPage = newPage;
            loadActivationUsers();
        }

        // Load Activation Users
        async function loadActivationUsers() {
            try {
                const response = await adminFetch(`/admin/activation-users?page=${activationPage}&page_size=${activationPageSize}`);
                const data = await response.json();

                activationTotal = data.total || 0;

                const container = document.getElementById('activationUsersList');
                if (!data.data || data.data.length === 0) {
                    container.innerHTML = '<p class="empty">暂无待激活用户</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>有效天数</th>
                                <th>请求限制</th>
                                <th>备注</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td>${u.username}</td>
                                    <td>${u.valid_days} 天</td>
                                    <td>${u.request_limit}</td>
                                    <td>${u.remarks || '-'}</td>
                                    <td>${u.created_at}</td>
                                    <td>
                                        <button class="btn btn-sm btn-danger" onclick="deleteActivationUser(${u.id})">删除</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    </div>
                    <div class="pagination">
                        <button class="btn btn-sm" onclick="changeAPIKeysPage(1)" ${activationPage <= 1 ? 'disabled' : ''}>首页</button>
                        <button class="btn btn-sm" onclick="changeActivationPage(${activationPage - 1})" ${activationPage <= 1 ? 'disabled' : ''}>上一页</button>
                        <span>第 ${activationPage} / ${Math.ceil(activationTotal / activationPageSize)} 页</span>
                        <button class="btn btn-sm" onclick="changeActivationPage(${activationPage + 1})" ${activationPage >= Math.ceil(activationTotal / activationPageSize) ? 'disabled' : ''}>下一页</button>
                        <button class="btn btn-sm" onclick="changeActivationPage(${Math.ceil(activationTotal / activationPageSize)})" ${activationPage >= Math.ceil(activationTotal / activationPageSize) ? 'disabled' : ''}>尾页</button>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load activation users:', error);
            }
        }

        async function deleteActivationUser(id) {
            if (!confirm('确定要删除这个待激活用户吗？')) return;

            try {
                const response = await adminFetch(`/admin/activation-users/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadActivationUsers();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        // Load API Keys
        async function loadAPIKeys() {
            try {
                const response = await adminFetch(`/admin/apikeys?page=${apiKeysPage}&page_size=${apiKeysPageSize}`);
                const data = await response.json();

                apiKeysTotal = data.total || 0;

                const container = document.getElementById('apiKeysList');
                if (!data.data || data.data.length === 0) {
                    container.innerHTML = '<p class="empty">暂无 API Keys</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户</th>
                                <th>Key 名称</th>
                                <th>Key 值</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(k => `
                                <tr>
                                    <td>${k.id}</td>
                                    <td>${k.username || k.user_id}</td>
                                    <td>${k.key_name || '-'}</td>
                                    <td><code id="key-${k.id}">${k.key_value}</code> <button class="btn btn-sm btn-copy" onclick="copyKey('${k.key_value}')">复制</button></td>
                                    <td><span class="status ${k.is_active ? 'active' : 'inactive'}">${k.is_active ? '激活' : '禁用'}</span></td>
                                    <td>${k.created_at}</td>
                                    <td>
                                        <button class="btn btn-sm" onclick="resetApiKey(${k.id})">重置</button>
                                        <button class="btn btn-sm" onclick="toggleApiKey(${k.id})">${k.is_active ? '禁用' : '启用'}</button>
                                        <button class="btn btn-sm btn-danger" onclick="deleteApiKey(${k.id})">删除</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    </div>
                    <div class="pagination">
                        <button class="btn btn-sm" onclick="changeAPIKeysPage(1)" ${apiKeysPage <= 1 ? 'disabled' : ''}>首页</button>
                        <button class="btn btn-sm" onclick="changeAPIKeysPage(${apiKeysPage - 1})" ${apiKeysPage <= 1 ? 'disabled' : ''}>上一页</button>
                        <span>第 ${apiKeysPage} / ${Math.ceil(apiKeysTotal / apiKeysPageSize)} 页</span>
                        <button class="btn btn-sm" onclick="changeAPIKeysPage(${apiKeysPage + 1})" ${apiKeysPage >= Math.ceil(apiKeysTotal / apiKeysPageSize) ? 'disabled' : ''}>下一页</button>
                        <button class="btn btn-sm" onclick="changeAPIKeysPage(${Math.ceil(apiKeysTotal / apiKeysPageSize)})" ${apiKeysPage >= Math.ceil(apiKeysTotal / apiKeysPageSize) ? 'disabled' : ''}>末页</button>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load API keys:', error);
            }
        }

        function changeAPIKeysPage(newPage) {
            const totalPages = Math.ceil(apiKeysTotal / apiKeysPageSize);
            if (newPage < 1 || newPage > totalPages) return;
            apiKeysPage = newPage;
            loadAPIKeys();
        }

        // Load Usage
        async function loadUsage() {
            try {
                const [statsRes, usageRes] = await Promise.all([
                    adminFetch('/admin/stats'),
                    adminFetch('/admin/usage')
                ]);

                const stats = await statsRes.json();
                const usageData = await usageRes.json();

                // Update stats
                document.getElementById('totalRequests').textContent = stats.total_requests || 0;
                document.getElementById('totalTokens').textContent = stats.total_tokens || 0;
                document.getElementById('totalCost').textContent = '$ ' + (stats.total_cost || 0).toFixed(6);
                document.getElementById('totalUsers').textContent = stats.total_users || 0;

                // Render usage logs
                const container = document.getElementById('usageList');
                if (!usageData.data || usageData.data.length === 0) {
                    container.innerHTML = '<p class="empty">暂无使用记录</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户ID</th>
                                <th>API Key ID</th>
                                <th>模型</th>
                                <th>Token</th>
                                <th>费用</th>
                                <th>延迟(ms)</th>
                                <th>时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${usageData.data.map(log => `
                                <tr>
                                    <td>${log.id}</td>
                                    <td>${log.user_id}</td>
                                    <td>${log.api_key_id}</td>
                                    <td>${log.model}</td>
                                    <td>${log.total_tokens}</td>
                                    <td>${log.cost.toFixed(6)}</td>
                                    <td>${log.latency_ms}</td>
                                    <td>${log.created_at}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load usage:', error);
            }
        }

        // Load Upstream Usage
        async function loadUpstreamUsage() {
            try {
                const response = await adminFetch('/admin/upstream-usage');
                const result = await response.json();

                const container = document.getElementById('upstreamUsage');

                if (!result.data || result.data.length === 0) {
                    container.innerHTML = '<p class="empty">暂无上游用量数据</p>';
                    return;
                }

                container.innerHTML = result.data.map((keyData, index) => {
                    const data = keyData;
                    if (data.base_resp && data.base_resp.status_code !== 0) {
                        return `<div class="upstream-key-section"><h3>API Key ${index + 1}</h3><p class="empty">获取用量失败: ${data.base_resp.status_msg || '未知错误'}</p></div>`;
                    }

                    const modelRemains = data.model_remains || [];
                    if (modelRemains.length === 0) {
                        return `<div class="upstream-key-section"><h3>API Key ${index + 1}</h3><p class="empty">暂无用量数据</p></div>`;
                    }

                    return `
                        <div class="upstream-key-section">
                            <h3>API Key ${index + 1}</h3>
                            <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>模型</th>
                                        <th>剩余时间</th>
                                        <th>当前周期配额</th>
                                        <th>剩余</th>
                                        <th>剩余用量百分比</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${modelRemains.map(m => {
                                        const usagePercent = m.current_interval_total_count > 0
                                            ? (m.current_interval_usage_count / m.current_interval_total_count * 100).toFixed(1)
                                            : 0;
                                        const remainsHours = (m.remains_time / 3600/1000).toFixed(1);
                                        const remaining = m.current_interval_total_count - m.current_interval_usage_count;
                                        return `
                                            <tr>
                                                <td>${m.model_name}</td>
                                                <td>${remainsHours} 小时</td>
                                                <td>${m.current_interval_total_count}</td>
                                                <td>${m.current_interval_usage_count}</td>
                                                <td>
                                                    <div class="progress-bar">
                                                        <div class="progress-fill" style="width: ${usagePercent}%"></div>
                                                    </div>
                                                    <span>${usagePercent}% (已用 ${remaining})</span>
                                                </td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Failed to load upstream usage:', error);
                document.getElementById('upstreamUsage').innerHTML = '<p class="empty">获取上游用量失败</p>';
            }
        }

        // Create User
        document.getElementById('createUserBtn').addEventListener('click', () => {
            // 默认过期时间为7天后
            const defaultExpiresAt = new Date();
            defaultExpiresAt.setDate(defaultExpiresAt.getDate() + 7);
            document.getElementById('createUserModal').querySelector('input[name="expires_at"]').value = defaultExpiresAt.toISOString().slice(0, 16);
            document.getElementById('createUserModal').style.display = 'block';
        });

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            const expiresAt = formData.get('expires_at');
            const requestBody = {
                username: formData.get('username'),
                password: formData.get('password'),
                remark: formData.get('remark'),
                request_limit: parseInt(formData.get('request_limit'))
            };
            if (expiresAt) {
                requestBody.expires_at = new Date(expiresAt).toISOString();
            }

            try {
                const response = await adminFetch('/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (response.ok) {
                    alert('用户创建成功');
                    document.getElementById('createUserModal').style.display = 'none';
                    e.target.reset();
                    loadUsers();
                } else {
                    alert('创建失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        // Create API Key
        document.getElementById('createApiKeyBtn').addEventListener('click', () => {
            document.getElementById('createApiKeyModal').style.display = 'block';
        });

        document.getElementById('createApiKeyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const response = await adminFetch('/admin/apikeys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: parseInt(formData.get('user_id')),
                        key_name: formData.get('key_name')
                    })
                });

                if (response.ok) {
                    alert('API Key 创建成功');
                    document.getElementById('createApiKeyModal').style.display = 'none';
                    e.target.reset();
                    loadAPIKeys();
                } else {
                    alert('创建失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        // 批量创建待激活用户
        document.getElementById('batchCreateActivationBtn').addEventListener('click', () => {
            document.getElementById('batchCreateActivationModal').style.display = 'block';
        });

        document.getElementById('batchCreateActivationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            const password = formData.get('password');
            const validDays = parseInt(formData.get('valid_days'));
            const requestLimit = parseInt(formData.get('request_limit'));
            const count = parseInt(formData.get('count'));
            const remarks = formData.get('remarks') || '';

            if (count < 1 || count > 100) {
                alert('账号个数必须在1-100之间');
                return;
            }

            // 生成随机用户名（8位英文字母）
            function generateUsername() {
                const chars = 'abcdefghijklmnopqrstuvwxyz';
                let result = '';
                for (let i = 0; i < 8; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            // 生成用户列表
            const users = [];
            for (let i = 0; i < count; i++) {
                users.push({
                    username: generateUsername(),
                    password: password,
                    valid_days: validDays,
                    request_limit: requestLimit,
                    remarks: remarks
                });
            }

            try {
                const response = await adminFetch('/admin/activation-users/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ users })
                });

                if (response.ok) {
                    const createdUsers = await response.json();
                    alert('成功创建 ' + createdUsers.length + ' 个待激活用户');
                    document.getElementById('batchCreateActivationModal').style.display = 'none';
                    e.target.reset();
                    loadActivationUsers();
                } else {
                    const error = await response.json();
                    alert('创建失败: ' + (error.error || '未知错误'));
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        // User operations
        async function editUser(id, currentLimit, expiresAt, username, remark) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editUsername').value = username;
            document.getElementById('editRequestLimit').value = currentLimit;

            // 处理过期时间 - 直接转换格式，保持本地时间不变
            if (expiresAt) {
                document.getElementById('editExpiresAt').value = expiresAt.replace(' ', 'T').slice(0, 16);
            } else {
                document.getElementById('editExpiresAt').value = '';
            }

            // 处理备注
            document.getElementById('editRemark').value = remark || '';

            document.getElementById('editUserModal').style.display = 'block';
        }

        // 编辑用户表单提交
        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const userId = formData.get('id');

            const expiresAt = formData.get('expires_at');
            const requestBody = {
                request_limit: parseInt(formData.get('request_limit'))
            };
            if (expiresAt) {
                requestBody.expires_at = new Date(expiresAt).toISOString();
            }
            requestBody.remark = formData.get('remark');

            try {
                const response = await adminFetch(`/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (response.ok) {
                    document.getElementById('editUserModal').style.display = 'none';
                    loadUsers();
                } else {
                    alert('更新失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        async function deleteUser(id) {
            if (!confirm('确定要删除这个用户吗？')) return;

            try {
                const response = await adminFetch(`/admin/users/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadUsers();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        // API Key operations
        async function resetApiKey(id) {
            if (!confirm('确定要重置这个 API Key 吗？')) return;

            try {
                const response = await adminFetch(`/admin/apikeys/${id}/reset`, { method: 'POST' });
                const data = await response.json();

                if (response.ok) {
                    alert('API Key 已重置: ' + data.key_value);
                    loadAPIKeys();
                } else {
                    alert('重置失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        async function toggleApiKey(id) {
            try {
                const response = await adminFetch(`/admin/apikeys/${id}/toggle`, { method: 'POST' });
                if (response.ok) {
                    loadAPIKeys();
                } else {
                    alert('操作失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        async function deleteApiKey(id) {
            if (!confirm('确定要删除这个 API Key 吗？')) return;

            try {
                const response = await adminFetch(`/admin/apikeys/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadAPIKeys();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        // Modal close
        document.querySelectorAll('.close').forEach(close => {
            close.addEventListener('click', () => {
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            });
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        // Initial load
        loadUsers();
    </script>
</body>
</html>
