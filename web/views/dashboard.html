<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - LLM API</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <nav class="navbar">
                <h1>LLM API</h1>
                <div class="nav-links">
                    <a href="/help.html" class="nav-link">使用说明</a>
                    <span id="username"></span>
                    <button id="logoutBtn" class="btn btn-sm">退出</button>
                </div>
            </nav>
        </header>

        <main>
            <section class="stats-section">
                <h2>baseUrl: http://120.24.86.32:3000</h2>
                <p><b>注意:</b>记得替换 base_url 比如:【https://api.minimaxi.com/后缀】 >>替换 【http://120.24.86.32:3000/后缀】 </p>
            </section>

            <section class="stats-section">
                
                <h2>用量统计</h2>
                <div class="stat-card-full">
                    <h3>过期时间</h3>
                    <p class="stat-value" id="expiresAt">-</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>可用次数</h3>
                        <p class="stat-value" id="availableRequests">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>已用次数</h3>
                        <p class="stat-value" id="usedRequests">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>总调用次数</h3>
                        <p class="stat-value" id="totalRequests">-</p>
                    </div>
                    <div class="stat-card">
                        <h3>总 Token 数</h3>
                        <p class="stat-value" id="totalTokens">-</p>
                    </div>
                </div>
            </section>

            <section class="apikeys-section">
                <div class="section-header">
                    <h2>API Keys</h2>
                    <button id="createKeyBtn" class="btn btn-primary">创建 API Key</button>
                </div>
                <div id="apiKeysList" class="apikeys-list">
                    <!-- API Keys will be loaded here -->
                </div>
            </section>

            <section class="usage-section">
                <h2>使用记录</h2>
                <div id="usageList" class="usage-list">
                    <!-- Usage logs will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '/login.html';
        }

        document.getElementById('username').textContent = user.username;

        // Load data
        async function loadData() {
            try {
                const [userRes, usageRes, keysRes] = await Promise.all([
                    fetch('/web/user/me', {
                        headers: {
                            'Authorization': 'Bearer ' + localStorage.getItem('token') || ''
                        }
                    }),
                    fetch('/web/user/usage', {
                        headers: {
                            'Authorization': 'Bearer ' + localStorage.getItem('token') || ''
                        }
                    }),
                    fetch('/web/user/apikeys', {
                        headers: {
                            'Authorization': 'Bearer ' + localStorage.getItem('token') || ''
                        }
                    })
                ]);

                // Check if token is invalid (401)
                if (userRes.status === 401 || usageRes.status === 401 || keysRes.status === 401) {
                    localStorage.removeItem('user');
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                    return;
                }

                const userData = await userRes.json();
                const usageData = await usageRes.json();
                const keysData = await keysRes.json();

                // Update user info
                document.getElementById('expiresAt').textContent = userData.expires_at || '永久有效';

                // Update stats
                document.getElementById('availableRequests').textContent = usageData.request_limit - usageData.request_used;
                document.getElementById('usedRequests').textContent = usageData.request_used;
                document.getElementById('totalRequests').textContent = usageData.total_requests || 0;
                document.getElementById('totalTokens').textContent = usageData.total_tokens || 0;

                // Render API Keys
                renderAPIKeys(keysData);

                // Render Usage Logs
                renderUsageLogs(usageData.data);
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }

        async function copyKey(keyValue) {
            // 1. 优先尝试现代 API (iOS 10+, Android 大多数)
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(keyValue);
                    showToast('✅ 复制成功');
                    return;
                } catch (err) {
                    console.warn('现代 API 失败，尝试降级方案', err);
                }
            }

            // 2. 降级方案 (兼容旧版 iOS/Android)
            const textarea = document.createElement('textarea');
            textarea.value = keyValue;
            
            // 移动端关键样式：不能 display:none，否则 iOS 无法复制
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.width = '2em';
            textarea.style.height = '2em';
            textarea.style.padding = '0';
            textarea.style.border = 'none';
            textarea.style.outline = 'none';
            textarea.style.opacity = '0';
            textarea.style.transform = 'scale(0)'; // 缩放隐藏比 opacity 更稳妥
            
            // 防止移动端选中时弹出键盘
            textarea.setAttribute('readonly', 'readonly'); 
            
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, 999999); // 兼容 iOS 选中范围

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('✅ 复制成功 (兼容模式)');
                } else {
                    showToast('❌ 复制失败，请长按手动复制');
                }
            } catch (err) {
                console.error('execCommand 错误', err);
                showToast('❌ 复制失败，请长按手动复制');
            } finally {
                document.body.removeChild(textarea);
            }
        }

        // 简单的 Toast 提示（比 alert 体验更好，不阻断流程）
        function showToast(msg) {
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.cssText = `
                position: fixed; top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.7); color: #fff;
                padding: 10px 20px; border-radius: 5px;
                z-index: 9999; font-size: 14px; pointer-events: none;
            `;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }
        

        function renderAPIKeys(keys) {
            const container = document.getElementById('apiKeysList');
            if (!keys || keys.length === 0) {
                container.innerHTML = '<p class="empty">暂无 API Keys</p>';
                return;
            }

            container.innerHTML = keys.map(key => `
                <div class="apikey-item">
                    <div class="apikey-info">
                        <strong>${key.key_name || 'API Key'}</strong>
                        <code>${key.key_value}</code>
                        <button class="btn btn-sm btn-copy" onclick="copyKey('${key.key_value}')">复制</button>
                        <span class="status ${key.is_active ? 'active' : 'inactive'}">
                            ${key.is_active ? '激活' : '禁用'}
                        </span>
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="deleteKey(${key.id})">删除</button>
                </div>
            `).join('');
        }

        function renderUsageLogs(logs) {
            const container = document.getElementById('usageList');
            if (!logs || logs.length === 0) {
                container.innerHTML = '<p class="empty">暂无使用记录</p>';
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="usage-item">
                    <span class="model">${log.model}</span>
                    <span class="tokens">${log.total_tokens} tokens</span>
                    <span class="cost">$ ${log.cost.toFixed(6)}</span>
                    <span class="time">${log.created_at}</span>
                </div>
            `).join('');
        }

        // Create API Key
        document.getElementById('createKeyBtn').addEventListener('click', async () => {
            const keyName = prompt('请输入 API Key 名称:', 'My API Key');
            if (!keyName) return;

            try {
                const response = await fetch('/web/user/apikeys', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token') || ''
                    },
                    body: JSON.stringify({ key_name: keyName })
                });

                if (response.ok) {
                    alert('API Key 创建成功！');
                    loadData();
                } else {
                    alert('创建失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        // Delete API Key
        async function deleteKey(id) {
            if (!confirm('确定要删除这个 API Key 吗？')) return;

            try {
                const response = await fetch(`/web/user/apikeys/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token') || ''
                    }
                });

                if (response.ok) {
                    loadData();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        loadData();
    </script>
</body>
</html>
