## 简介

欢迎使用 LLM API 本平台为您提供稳定、快速的 AI 大语言模型 API 调用服务，支持多种主流模型。

本平台是中转各大 AI 服务器的中介平台。

## 快速开始

### 1. 用我发的账号密码登陆后自动激活 登陆地址 http://120.24.86.32:3000

登陆成功后，系统会自动激活账号，无需手动操作。上面有当前账号的剩余调用次数和过期时间，请留意使用。

### 2. 创建 API Key（默认自动创建了一个key 多个key共用额度的）

登录后，在仪表盘页面点击 **"创建 API Key"** 按钮，填写一个易于识别的名称，即可生成专属的 API Key。

### 3. 开始调用

使用您创建的 API Key 即可调用 API 服务。


---

## 常见问题

- **模型用量次数是自己专属的吗？** - 是的，每个账号的调用次数是独立的，不同账号之间不共享调用次数。
- **API Key 可以创建多个吗？** - 是的，您可以创建多个 API Key 来管理不同的应用或项目，但它们共用同一个账号的调用次数。
- **调用次数用完了怎么办？** - 每5小时会自动补充调用次数，您也可以联系管理员获取更多调用次数。
- **是官网直连的apikey吗？** - 不是的，我们平台是中转官网的中间平台，API Key 是我们平台专用的，调用会转发到对应的 AI 服务器。
- **什么时候刷新额度？** - 额度会在每5小时自动刷新。在0点、5点、10点、15点、20点刷新。
- **会被限流吗？** - 不会，只要您的账号有剩余调用次数，就可以正常调用 API，不会因为调用频率过高而被限流。
- **一次调用是什么意思？** - 一次调用指的是您向 API 发送一次请求并获得响应的过程。 每次调用会扣除相应的调用次数，不限制上下文长度。所以不限制token长度。只要调用成功就会扣除调用次数。

---

如有任何问题，请随时联系技术支持。

    {
      "role": "user",
      "content": "你好",
      "name": "用户"
    }
  ],
  "stream": false
  }
'

\`\`\`
