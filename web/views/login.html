<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能爬 API - nengpa.com</title>
    <script>
        if (location.host === '120.24.86.32:3000') {
            location.href = 'https://www.nengpa.com' + location.pathname + location.search;
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css?v=1.0">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>登录</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group remember-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">记住我</label>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </div>
                <div class="form-group">
                    <a href="/register.html" class="">注册新账号</a>
                </div>
                <div id="error" class="error"></div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // 页面加载时自动填充保存的账号密码
        document.addEventListener('DOMContentLoaded', () => {
            const savedRemember = localStorage.getItem('remember');
            if (savedRemember === 'true') {
                const savedUsername = localStorage.getItem('savedUsername');
                const savedPassword = localStorage.getItem('savedPassword');
                if (savedUsername) document.getElementById('username').value = savedUsername;
                if (savedPassword) document.getElementById('password').value = savedPassword;
                document.getElementById('remember').checked = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorDiv = document.getElementById('error');

            // 保存或清除账号密码
            if (remember) {
                localStorage.setItem('remember', 'true');
                localStorage.setItem('savedUsername', username);
                localStorage.setItem('savedPassword', password);
            } else {
                localStorage.removeItem('remember');
                localStorage.removeItem('savedUsername');
                localStorage.removeItem('savedPassword');
            }

            try {
                const response = await fetch('/web/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    if (data.user.is_admin) {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorDiv.textContent = data.error || '登录失败';
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请稍后重试';
            }
        });
    </script>
</body>
</html>
