<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本转语音 (TTS) 工具</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --border: #e2e8f0;
      --success: #10b981;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: var(--card);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 560px;
    }
    h2 { margin-bottom: 1.5rem; text-align: center; color: var(--primary); }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem; }
    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: vertical; min-height: 100px; }
    .char-count { text-align: right; font-size: 0.85rem; color: #64748b; margin-top: 0.25rem; }
    button {
      width: 100%;
      padding: 0.85rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: var(--primary-hover); }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      text-align: center;
      font-size: 0.95rem;
      display: none;
    }
    .status-loading { background: #e0f2fe; color: #0369a1; display: block !important; }
    .status-success { background: #dcfce7; color: #15803d; display: block !important; }
    .status-error { background: #fee2e2; color: #b91c1c; display: block !important; }
    #audioPlayer {
      width: 100%;
      margin-top: 1rem;
      display: none;
    }
    #downloadBtn {
      margin-top: 1rem;
      background: var(--success);
      display: none;
      text-decoration: none;
      text-align: center;
      padding: 0.85rem;
      border-radius: 8px;
      color: white;
      font-weight: 500;
    }
    #downloadBtn:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎙️ 文本转语音 (TTS)</h2>
    
    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="请输入你的 API Key">
    </div>

    <div class="form-group">
      <label for="text">文本内容 (最多300字)</label>
      <textarea id="text" maxlength="300" placeholder="请输入要转换的中文或英文文本..."></textarea>
      <div class="char-count"><span id="charCount">0</span> / 300</div>
    </div>
    <div id="voice-container"></div>
 

    <button id="generateBtn">生成并下载 MP3</button>
    
    <div id="status"></div>
    <audio id="audioPlayer" controls></audio>
    <a id="downloadBtn" href="#" download="tts_output.mp3">⬇️ 下载 MP3 文件</a>
  </div>

  <script>
    const apiKeyInput = document.getElementById('apiKey');
    const textInput = document.getElementById('text');
    const charCount = document.getElementById('charCount');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    

    // 字数统计
    textInput.addEventListener('input', () => {
      charCount.textContent = textInput.value.length;
    });

    // 十六进制字符串转 ArrayBuffer
    function hexToArrayBuffer(hex) {
      hex = hex.replace(/\s/g, ''); // 去除空格
      if (hex.length % 2 !== 0) hex = '0' + hex; // 奇数位补0
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2) {
        bytes[i / 2] = parseInt(hex.slice(i, i + 2), 16);
      }
      return bytes.buffer;
    }

    // 主逻辑
    generateBtn.addEventListener('click', async () => {
      const apiKey = apiKeyInput.value.trim();
      const text = textInput.value.trim();
      const voiceSelect = document.getElementById('voice-select');
      const selectedVoiceId = voiceSelect ? voiceSelect.value : "diadia_xuemei";

      // 保存到 localStorage
      localStorage.setItem('tts_apiKey', apiKey);
      localStorage.setItem('tts_text', text);
      localStorage.setItem('tts_voiceId', selectedVoiceId);

      // 基础校验
      if (!apiKey) {
        showStatus('请输入 API Key', 'error');
        return;
      }
      if (!text) {
        showStatus('请输入文本内容', 'error');
        return;
      }

      // 重置 UI 状态
      showStatus('正在请求接口生成语音，请稍候...', 'loading');
      generateBtn.disabled = true;
      audioPlayer.style.display = 'none';
      downloadBtn.style.display = 'none';

      // 构造请求体 (与 curl 示例保持一致)
      const payload = {
        model: "speech-2.8-hd",
        text: text,
        stream: false,
        voice_setting: {
          voice_id: selectedVoiceId,
          speed: 1,
          vol: 1,
          pitch: 0,
          emotion: "happy"
        },
        audio_setting: {
          sample_rate: 32000,
          bitrate: 128000,
          format: "mp3",
          channel: 1
        },
        pronunciation_dict: { tone: [] },
        subtitle_enable: false
      };

      try {
        const response = await fetch('https://api.nengpa.com/v1/t2a_v2', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP 错误: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        // 检查业务状态码
        if (data.base_resp && data.base_resp.status_code === 0) {
          const hexAudio = data.data?.audio;
          if (!hexAudio) {
            throw new Error('接口返回成功，但未获取到 audio 数据');
          }

          // 16进制转 Blob
          const arrayBuffer = hexToArrayBuffer(hexAudio);
          const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
          const audioUrl = URL.createObjectURL(blob);

          // 绑定音频播放器
          audioPlayer.src = audioUrl;
          audioPlayer.style.display = 'block';
          audioPlayer.play().catch(() => {}); // 自动播放可能被浏览器拦截

          // 绑定下载按钮
          downloadBtn.href = audioUrl;
          downloadBtn.style.display = 'block';

          showStatus('✅ 生成成功！可在线试听或下载', 'success');
        } else {
          throw new Error(data.base_resp?.status_msg || '接口返回业务错误');
        }
      } catch (error) {
        console.error('TTS Error:', error);
        showStatus(`❌ 失败: ${error.message}`, 'error');
      } finally {
        generateBtn.disabled = false;
      }
    });

    function showStatus(msg, type) {
      statusDiv.textContent = msg;
      statusDiv.className = ''; // 清除旧类
      statusDiv.classList.add(`status-${type}`);
    }

// 创建下拉列表函数
function createVoiceDropdown(voiceData, containerId) {
  const container = document.getElementById(containerId);
  if (!container) {
    console.error('容器元素不存在');
    return;
  }

  // 创建 select 元素
  const select = document.createElement('select');
  select.id = 'voice-select';
  select.name = 'voice';
  select.style.width = '100%';
  select.style.padding = '8px';
  select.style.margin = '10px 0';

  // 添加默认选项
  const defaultOption = document.createElement('option');
  defaultOption.value = '';
  defaultOption.textContent = '请选择声音';
  select.appendChild(defaultOption);

  // 按语言/类型分组声音
  const groupedVoices = {};
  
  voiceData.system_voice.forEach(voice => {
    // 从 voice_id 推断语言/类型
    let category = '其他';
    
    if (voice.voice_id.includes('Chinese (Mandarin)') || 
        voice.voice_id.includes('male-') || 
        voice.voice_id.includes('female-') ||
        /[\u4e00-\u9fff]/.test(voice.voice_name)) {
      category = '中文';
    } else if (voice.voice_id.includes('Cantonese')) {
      category = '粤语';
    } else if (voice.voice_id.includes('English')) {
      category = '英语';
    } else if (voice.voice_id.includes('Japanese')) {
      category = '日语';
    } else if (voice.voice_id.includes('Korean')) {
      category = '韩语';
    } else if (voice.voice_id.includes('Spanish')) {
      category = '西班牙语';
    } else if (voice.voice_id.includes('Portuguese')) {
      category = '葡萄牙语';
    } else if (voice.voice_id.includes('French')) {
      category = '法语';
    } else if (voice.voice_id.includes('Indonesian')) {
      category = '印尼语';
    } else if (voice.voice_id.includes('German')) {
      category = '德语';
    } else if (voice.voice_id.includes('Russian')) {
      category = '俄语';
    } else if (voice.voice_id.includes('Italian')) {
      category = '意大利语';
    } else if (voice.voice_id.includes('Arabic')) {
      category = '阿拉伯语';
    } else if (voice.voice_id.includes('Turkish')) {
      category = '土耳其语';
    } else if (voice.voice_id.includes('Ukrainian')) {
      category = '乌克兰语';
    } else if (voice.voice_id.includes('Dutch')) {
      category = '荷兰语';
    } else if (voice.voice_id.includes('Vietnamese')) {
      category = '越南语';
    }
    
    if (!groupedVoices[category]) {
      groupedVoices[category] = [];
    }
    
    groupedVoices[category].push(voice);
  });

  // 按分类排序
  const categoryOrder = ['中文', '粤语', '英语', '日语', '韩语', '西班牙语', 
                         '葡萄牙语', '法语', '印尼语', '德语', '俄语', '意大利语', 
                         '阿拉伯语', '土耳其语', '乌克兰语', '荷兰语', '越南语', '其他'];
  
  // 为每个分类创建 optgroup
  categoryOrder.forEach(category => {
    if (groupedVoices[category]) {
      const optgroup = document.createElement('optgroup');
      optgroup.label = `${category} (${groupedVoices[category].length})`;
      
      // 按名称排序
      groupedVoices[category].sort((a, b) => a.voice_name.localeCompare(b.voice_name));
      
      groupedVoices[category].forEach(voice => {
        const option = document.createElement('option');
        option.value = voice.voice_id;
        option.textContent = `${voice.voice_name} (${voice.voice_id})`;
        option.title = voice.description && voice.description.length > 0 
          ? voice.description.join(' ') 
          : voice.voice_name;
        
        // 为 beta 版本添加特殊标记
        if (voice.voice_id.includes('-jingpin') || voice.voice_id.includes('-beta')) {
          option.textContent += ' [Beta]';
        }
        
        optgroup.appendChild(option);
      });
      
      select.appendChild(optgroup);
    }
  });

  // 将 select 添加到容器
  container.appendChild(select);

  // 添加搜索功能
  const searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.placeholder = '搜索声音...';
  searchInput.style.width = '100%';
  searchInput.style.padding = '8px';
  searchInput.style.marginBottom = '10px';
  searchInput.style.boxSizing = 'border-box';

  searchInput.addEventListener('input', function() {
    const searchTerm = this.value.toLowerCase();
    const options = select.querySelectorAll('option');
    
    options.forEach(option => {
      const text = option.textContent.toLowerCase();
      if (text.includes(searchTerm) || searchTerm === '') {
        option.style.display = '';
      } else {
        option.style.display = 'none';
      }
    });
  });

  // 在 select 前插入搜索框
  container.insertBefore(searchInput, select);

  // 添加选择事件监听
  select.addEventListener('change', function() {
    if (this.value) {
      const selectedOption = this.options[this.selectedIndex];
      console.log('选择的声音ID:', this.value);
      console.log('选择的声音名称:', selectedOption.textContent);
      
      // 可以在这里添加处理选择逻辑
      // 例如：更新某个显示区域
      const infoDiv = document.createElement('div');
      infoDiv.id = 'voice-info';
      infoDiv.style.marginTop = '10px';
      infoDiv.style.padding = '10px';
      infoDiv.style.backgroundColor = '#f0f0f0';
      infoDiv.style.borderRadius = '4px';
      
      // 移除已存在的 infoDiv
      const existingInfo = document.getElementById('voice-info');
      if (existingInfo) {
        existingInfo.remove();
      }
      
      infoDiv.innerHTML = `
        <strong>已选择:</strong> ${selectedOption.textContent}<br>
        <strong>ID:</strong> ${this.value}
      `;
      container.appendChild(infoDiv);
    }
  });

  return select;
}

    }
    
    #voice-select optgroup {

    #voice-select option {
      padding: 6px 10px;

    #voice-select option:checked {

      color: white;
    }
  `;
  document.head.appendChild(style);
});
